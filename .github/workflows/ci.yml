name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege default: this workflow only reads the repo and runs tests, it never needs write
# access. deploy-pages.yml grants its own additional permissions for the job that actually deploys.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - run: npm test
      - run: npm audit --omit=dev
